<!DOCTYPE html>
<html>
<head>
  <title>2Chat Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/css/profile.css">
  
</head>
<body>

<div class="cover">

<img
id="coverImage"
class="cover-image"
src="https://via.placeholder.com/900x250">

<input
type="file"
id="coverFile"
hidden>

<button
class="cover-btn"
onclick="document.getElementById('coverFile').click()">
📷 Change Cover
</button>

</div>

<div class="profile-box">

<img
id="avatar"
class="avatar">

<input
type="file"
id="avatarFile"
hidden>

<button
class="avatar-btn"
onclick="document.getElementById('avatarFile').click()">
📷 Change Photo
</button>

<h2 id="username"></h2>

<p id="email"></p>

<p id="bio"></p>

<div class="stats">

<div class="stat">
  <h2 id="postsCount">0</h2>
  <p>Posts</p>
</div>

<div>
<b id="followers">0</b>
<br>
Followers
</div>

<div>
<b id="following">0</b>
<br>
Following
</div>

</div>

<hr>

<input
id="newUsername"
placeholder="New Username">

<br><br>

<textarea
id="newBio"
placeholder="Write your bio">
</textarea>

<br><br>

<button
id="followBtn"
style="display:none;"
onclick="followUser(profileUsername)">
➕ Follow
</button>

<button onclick="saveProfile()">
💾 Save Profile
</button>

<button onclick="uploadAvatar()">
📷 Upload Avatar
</button>

<button onclick="goHome()">
🏠 Home
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<div class="my-posts">

<h2>
🖼 My Posts
</h2>

<div id="myPosts">

</div>

</div>

<script src="/js/profile.js"></script>

</body>

</html>
