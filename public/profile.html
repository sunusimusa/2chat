<!DOCTYPE html>
<html>
<head>
  <title>2Chat Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/css/profile.css">
  
</head>
<body>

<h1>My Profile</h1>

<img
id="avatar"
class="avatar">


<br><br>

<input
type="file"
id="avatarFile">

<br><br>

<button
onclick="uploadAvatar()">
📷 Upload Avatar
</button> 

<h2 id="username"></h2>

<p id="email"></p>

<p id="bio"></p>

<hr>

<input
id="newUsername"
placeholder="New Username">

<br><br>

<textarea
id="newBio"
placeholder="Write your bio">
</textarea>

<br><br>

<button onclick="saveProfile()">
Save Profile
</button>
  
  <button onclick="goHome()">
🏠 Back To Home
</button>

<br><br>

<br><br>

<button onclick="logout()">
Logout
</button>

<script src="/js/profile.js"></script>

</body>
</html>
