<!DOCTYPE html>
<html>
<head>
  <title>2Chat Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:20px;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,.1);
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      background:#0084ff;
      color:white;
      cursor:pointer;
    }

    h2{
      text-align:center;
    }

    #msg{
      color:red;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="box">

<h2>2Chat Login</h2>

<input
  type="email"
  id="email"
  placeholder="Email"
/>

<input
  type="password"
  id="password"
  placeholder="Password"
/>

<button onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script>

async function login(){

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  const res = await fetch(
    "/api/auth/login",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  if(data.success){

    localStorage.setItem(
      "token",
      data.token
    );

    localStorage.setItem(
      "user",
      JSON.stringify(data.user)
    );

    location.href="/home.html";

  }else{

    document.getElementById("msg")
      .innerText =
      data.message || "Login failed";

  }

}

</script>

</body>
</html>
