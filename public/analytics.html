<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Creator Analytics</title>

<link rel="stylesheet" href="/css/analytics.css">

</head>

<body>

<header class="topbar">

<button onclick="history.back()">
⬅
</button>

<h2>📊 Creator Dashboard</h2>

</header>


<div class="dashboard">


<div class="card">

<h3>🎥 Videos</h3>

<h1 id="totalVideos">0</h1>

</div>


<div class="card">

<h3>👁 Views</h3>

<h1 id="totalViews">0</h1>

</div>


<div class="card">

<h3>❤️ Likes</h3>

<h1 id="totalLikes">0</h1>

</div>


<div class="card">

<h3>💬 Comments</h3>

<h1 id="totalComments">0</h1>

</div>


<div class="card">

<h3>📤 Shares</h3>

<h1 id="totalShares">0</h1>

</div>


<div class="card">

<h3>🔖 Saves</h3>

<h1 id="totalSaves">0</h1>

</div>


<div class="card">

<h3>⏱ Watch Time</h3>

<h1 id="watchTime">0 sec</h1>

</div>


<div class="card">

<h3>📈 Engagement</h3>

<h1 id="engagement">0%</h1>

</div>


</div>



<!-- Views Chart -->

<div class="chart-box">

<h2>📈 Views Last 7 Days</h2>

<canvas id="viewsChart"></canvas>

</div>

<div class="top-shorts">

<h2>
🏆 Top Performing Shorts
</h2>


<div id="topVideos">

</div>


</div>

<!-- Best Video -->

<div class="top-video">

<h2>
🏆 Best Performing Video
</h2>


<video
id="bestVideo"
controls
playsinline>
</video>


<p id="bestCaption"></p>


</div>

<div class="chart-box">

<h2>
👥 Followers Growth
</h2>

<h1 id="totalFollowers">
0
</h1>

<canvas id="followersChart"></canvas>

</div>

<div class="bottom-nav">

</a>

</a>

📊<br>

</a>


</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/js/analytics.js"></script>


</body>

</html>
