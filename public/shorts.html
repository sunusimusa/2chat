<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>2Chat Shorts</title>

<link rel="stylesheet"
href="/css/shorts.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
  
<div class="top-tabs">

<a href="/following.html" title="Following">
<i class="fa-solid fa-user-group"></i>
</a>

<a href="/shorts.html" class="active" title="For You">
<i class="fa-solid fa-house"></i>
</a>

<a href="/search.html" title="Search">
<i class="fa-solid fa-magnifying-glass"></i>
</a>

<a href="/trending.html" title="Trending">
<i class="fa-solid fa-fire"></i>
</a>

</div>

<div id="shortsContainer"></div>

<!-- Upload Button -->

<!-- Comment Popup -->

<div
id="commentModal"
class="comment-modal">

<div class="comment-box">

<div class="comment-header">

<h3>💬 Comments</h3>

<button
onclick="closeComments()">

✖

</button>

</div>

<div
id="commentList"
class="comment-list">

</div>

<div class="comment-input">

<input
type="text"
id="commentText"
placeholder="Write a comment...">

<button
onclick="sendComment()">

Send

</button>

</div>

</div>

</div>

<script src="/js/shorts.js"></script>

</body>
</html>
