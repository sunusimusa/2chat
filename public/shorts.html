<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>2Chat Shorts</title>

<link rel="stylesheet"
href="/css/shorts.css">

</head>

<body>

  <div class="short-tabs">

<span id="followingTab"
onclick="showFollowing()">
Following
</span>

<span id="forYouTab"
class="active"
onclick="showForYou()">
For You
</span>

<a href="/hashtag.html">
🔎 Search
</a> 

<span
onclick="location.href='/trending.html'">
🔥 Trending
</span>

</div>

<div id="shortsContainer"></div>

<!-- Upload Button -->

<!-- Comment Popup -->

<div
id="commentModal"
class="comment-modal">

<div class="comment-box">

<div class="comment-header">

<h3>💬 Comments</h3>

<button
onclick="closeComments()">

✖

</button>

</div>

<div
id="commentList"
class="comment-list">

</div>

<div class="comment-input">

<input
type="text"
id="commentText"
placeholder="Write a comment...">

<button
onclick="sendComment()">

Send

</button>

</div>

</div>

</div>

<script src="/js/shorts.js"></script>

</body>
</html>
