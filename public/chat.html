<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2Chat Chat</title>

<link rel="stylesheet" href="/css/chat.css">

</head>


<body>


<!-- Reaction Popup -->

<div id="reactionPopup" class="reaction-popup">

<span onclick="selectReaction('❤️')">❤️</span>
<span onclick="selectReaction('👍')">👍</span>
<span onclick="selectReaction('😂')">😂</span>
<span onclick="selectReaction('😮')">😮</span>
<span onclick="selectReaction('😢')">😢</span>
<span onclick="selectReaction('😡')">😡</span>

</div>



<!-- Header -->

<div class="header">

<button onclick="history.back()">
⬅
</button>


<div>

<span id="chatUser"></span>

<br>

<small id="status">
⚫ Offline
</small>


<br>


<small
id="typing"
style="display:none;color:white;">

✍️ Typing...

</small>


</div>

</div>



<!-- Messages -->

<div id="chat"></div>




<!-- Image Preview -->

<div
id="previewBox"
style="
display:none;
padding:10px;
background:#fff;
border-top:1px solid #ddd;
text-align:center;
">


<img
id="previewImage"
style="
max-width:220px;
max-height:220px;
border-radius:12px;
">


<br><br>


<button onclick="removeImage()">

❌ Remove

</button>


</div>





<!-- Bottom -->

<div class="bottom">


<input
type="file"
id="image"
accept="image/*"
style="display:none;">



<label
for="image"
class="image-btn">

📷

</label>



<textarea
id="message"
placeholder="Type message..."></textarea>



<button
id="sendBtn"
onclick="sendMessage()">

📤

</button>



</div>






<!-- Full Image Viewer -->

<div
id="imageViewer"
class="image-viewer"
style="display:none;">



<span
class="close-image"
onclick="closeImage()">

✖

</span>



<img id="fullImage">



</div>




<script src="/socket.io/socket.io.js"></script>

<script src="/js/chat.js"></script>


</body>

</html>
