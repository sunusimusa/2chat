<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2Chat Chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/socket.io/socket.io.js"></script>
  
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f2f5;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
height:60px;
background:#1877f2;
color:white;
display:flex;
align-items:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

.header button{
margin-right:15px;
border:none;
background:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.me{
display:flex;
justify-content:flex-end;
margin:8px 0;
}

.other{
display:flex;
justify-content:flex-start;
margin:8px 0;
}

.bubble-me{
background:#2563eb;
color:white;
padding:10px 15px;
border-radius:18px;
max-width:70%;
word-wrap:break-word;
}

.bubble-other{
background:white;
padding:10px 15px;
border-radius:18px;
max-width:70%;
word-wrap:break-word;
box-shadow:0 1px 3px rgba(0,0,0,.2);
}

.bottom{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
gap:10px;
}

.bottom textarea{
flex:1;
height:45px;
resize:none;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.bottom button{
width:80px;
background:#2563eb;
color:white;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="header">

<button onclick="history.back()">⬅</button>
<div>

<span id="chatUser"></span>

<br>

<small id="status">
⚫ Offline
</small>

</div>
  
</div>

<div id="chat"></div>

<div class="bottom">

<textarea
id="message"
placeholder="Type message..."></textarea>

<button onclick="sendMessage()">
📤
</button>

</div>

<script>

const user =
JSON.parse(localStorage.getItem("user"));

const socket = io();

socket.emit("join", user.username);

const params =
new URLSearchParams(window.location.search);

const receiver =
params.get("user");

document.getElementById("chatUser").innerText =
receiver;

async function loadMessages(){

if(!receiver) return;

const res =
await fetch(
`/api/messages/chat?sender=${user.username}&receiver=${receiver}`
);

const data =
await res.json();

let html="";

data.messages.forEach(msg=>{

const mine =
msg.sender===user.username;

html+=`

<div class="${mine?"me":"other"}">

<div class="${mine?"bubble-me":"bubble-other"}">

${msg.text}

</div>

</div>

`;

});

const chat =
document.getElementById("chat");

chat.innerHTML=html;

chat.scrollTop=
chat.scrollHeight;

}

async function sendMessage(){

const text =
document.getElementById("message").value.trim();

if(text==="") return;

const res =
await fetch(
"/api/messages/send",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sender:user.username,
receiver:receiver,
text:text
})
}
);

const data =
await res.json();

if(data.success){

socket.emit("newMessage",{
sender:user.username,
receiver,
text
});

document.getElementById("message").value="";

loadMessages();

}else{

alert(data.message);

}

}

loadMessages();

setInterval(loadMessages,2000);

socket.on("receiveMessage",(msg)=>{

if(
msg.sender===receiver ||
msg.receiver===receiver
){

loadMessages();

}

});

</script>

</body>
</html>
