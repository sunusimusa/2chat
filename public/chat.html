<!DOCTYPE html>
<html>
<head>
<title>2Chat Chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f0f2f5;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:15px;
background:#1877f2;
color:white;
font-size:20px;
font-weight:bold;
}

#chat{
height:65vh;
overflow-y:auto;
padding:10px;
}

.me{
display:flex;
justify-content:flex-end;
margin:8px 0;
}

.other{
display:flex;
justify-content:flex-start;
margin:8px 0;
}

.bubble-me{
background:#1877f2;
color:white;
padding:10px 15px;
border-radius:18px;
max-width:70%;
word-wrap:break-word;
}

.bubble-other{
background:white;
padding:10px 15px;
border-radius:18px;
max-width:70%;
word-wrap:break-word;
box-shadow:0 1px 3px rgba(0,0,0,.2);
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:10px;
padding:10px;
background:white;
}

.bottom textarea{
flex:1;
height:45px;
resize:none;
padding:10px;
border-radius:20px;
}

.bottom button{
width:80px;
border:none;
background:#1877f2;
color:white;
border-radius:20px;
}

</style>

</head>
<body>

<div class="header">

<button onclick="history.back()">
⬅
</button>

<span id="chatUser"></span>

</div>

<h3 id="chatUser"></h3>

<br><br>

<div class="bottom">

<textarea
id="message"
placeholder="Type message...">
</textarea>

<button onclick="sendMessage()">
📤
</button>

</div>

<hr>

<div id="chat"></div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

async function loadMessages(){

if(!receiver){
return;
}

const res =
await fetch(
`/api/messages/chat?sender=${user.username}&receiver=${receiver}`
);

const data =
await res.json();

let html = "";

data.messages.forEach(msg=>{

const mine =
msg.sender === user.username;

html += `

<div class="${
mine ? "me" : "other"
}">

<div class="${
mine ? "bubble-me" : "bubble-other"
}">

${msg.text}

</div>

</div>

`;
  
});

const chat =
document.getElementById("chat");

chat.scrollTop =
chat.scrollHeight;  

document.getElementById(
"chat"
).innerHTML = html;

}

const params =
new URLSearchParams(window.location.search);

const receiver =
params.get("user"); 

document.getElementById("chatUser").innerText =
"Chat with: " + receiver; 

async function sendMessage(){

const text =
document.getElementById("message").value;

const text =
document.getElementById(
"message"
).value;

if(!receiver || !text){

alert(
"Please fill all fields"
);

return;

}

const res =
await fetch(
"/api/messages/send",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
sender:user.username,
receiver,
text
})
}
);

const data =
await res.json();

if(data.success){

document.getElementById(
"message"
).value = "";

alert(
"✅ Message Sent"
);

loadMessages();

setInterval(loadMessages,2000);

}else{

alert(
data.message
);

}

}


</script>

</body>
</html>
