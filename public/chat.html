<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2Chat Chat</title>

<link rel="stylesheet" href="/css/chat.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

<!-- ===================== -->
<!-- HEADER -->
<!-- ===================== -->

<header class="chat-header">

<button
class="back-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div class="chat-user">

<img
id="chatAvatar"
src="/images/default.png"
class="chat-avatar">

<div class="chat-info">

<h3 id="chatUser">Loading...</h3>

<p id="status">

<i class="fa-solid fa-circle online-dot"></i>

Offline

</p>

<p
id="typing"
style="display:none;">

<i class="fa-solid fa-pen"></i>

Typing...

</p>

</div>

</div>

<div class="header-actions">

<button class="header-btn">

<i class="fa-solid fa-ellipsis-vertical"></i>

</button>

</div>

</header>

<!-- CHAT AREA -->

<div id="chat" class="chat-container"></div>

<!-- IMAGE PREVIEW -->

<div
id="previewBox"
class="preview-box"
style="display:none;">

<img id="previewImage">

<br><br>

<button onclick="removeImage()">

<i class="fa-solid fa-trash"></i>

Remove

</button>

</div>

<!-- REPLY PREVIEW -->

<div
id="replyPreview"
class="reply-preview"
style="display:none;">

<div class="reply-info">

<small>Replying to</small>

<p id="replyText"></p>

</div>

<button onclick="cancelReply()">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<!-- MESSAGE BAR -->

<div class="message-bar">

<label for="image" class="icon-btn">

<i class="fa-solid fa-image"></i>

</label>

<input
type="file"
id="image"
accept="image/*"
hidden>

<textarea
id="message"
placeholder="Type a message..."></textarea>

<button
id="recordBtn"
onclick="toggleRecording()">

<i
id="recordIcon"
class="fa-solid fa-microphone"></i>

</button>

<button
id="stopRecordBtn"
onclick="stopRecording()"
style="display:none;">

<i class="fa-solid fa-stop"></i>

</button>

<button
id="sendVoiceBtn"
onclick="sendVoice()"
style="display:none;">

<i class="fa-solid fa-paper-plane"></i>

</button>

  <button
id="sendBtn"
onclick="sendMessage()">

<i class="fa-solid fa-paper-plane"></i>

</button>

</div>

<!-- RECORDING -->

<div
id="recordingBox"
class="recording-box"
style="display:none;">

<span class="record-dot"></span>

<span id="recordTime">00:00</span>

<span class="record-text">

Recording...

</span>

</div>

<!-- REACTION -->

<div
id="reactionPopup"
class="reaction-popup">

<span onclick="selectReaction('❤️')">❤️</span>

<span onclick="selectReaction('👍')">👍</span>

<span onclick="selectReaction('😂')">😂</span>

<span onclick="selectReaction('😮')">😮</span>

<span onclick="selectReaction('😢')">😢</span>

<span onclick="selectReaction('😡')">😡</span>

</div>

<!-- IMAGE VIEWER -->

<div
id="imageViewer"
class="image-viewer"
style="display:none;">

<span
class="close-image"
onclick="closeImage()">

<i class="fa-solid fa-xmark"></i>

</span>

<img id="fullImage">

</div>

<!-- JAVASCRIPT -->

<script src="/socket.io/socket.io.js"></script>

<script src="/js/chat.js"></script>

</body>

</html>
