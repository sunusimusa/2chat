<!DOCTYPE html>
<html>
<head>
<title>2Chat Home</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>

<h1>🏠 2Chat Feed</h1>

  <p>
👤 Logged in as:
<b id="userName"></b>
</p>

<button onclick="goProfile()">
👤 My Profile
</button>

<button onclick="logout()">
🚪 Logout
</button>

<hr>

<textarea
id="postText"
placeholder="What's happening?">
</textarea>

<br><br>

<button onclick="createPost()">
Post
</button>

<hr>

<div id="feed"></div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){
  location.href="/login.html";
}

document.getElementById("userName")
.innerText = user.username;

function goProfile(){

location.href =
"/profile.html";

}

function logout(){

localStorage.clear();

location.href =
"/login.html";

}  

if(!user){
  location.href="/login.html";
}

async function commentPost(postId){

const text =
document.getElementById(
`comment-${postId}`
).value;

const res =
await fetch(
"/api/posts/comment",
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
postId,
username:user.username,
text
})
}
);

const data =
await res.json();

if(data.success){

loadPosts();

}else{

alert(data.message);

}

}  

// CREATE POST
async function createPost(){

const text =
document.getElementById(
"postText"
).value;

const res =
await fetch(
"/api/posts/create",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:user._id,
username:user.username,
text
})
}
);

const data =
await res.json();

if(data.success){

document.getElementById(
"postText"
).value = "";

loadPosts();

}else{

alert(data.message);

}

}

// LIKE POST
async function likePost(postId){

const res =
await fetch(
"/api/posts/like",
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
postId,
username:user.username
})
}
);

const data =
await res.json();

if(data.success){

loadPosts();

}else{

alert(data.message);

}

}

async function deletePost(postId){

const confirmDelete =
confirm("Delete this post?");

if(!confirmDelete){
return;
}

const res =
await fetch(
"/api/posts/delete",
{
method:"DELETE",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
postId
})
}
);

const data =
await res.json();

if(data.success){

alert("🗑️ Post Deleted");

loadPosts();

}else{

alert(data.message);

}

}  

// LOAD POSTS
async function loadPosts(){

const res =
await fetch("/api/posts");

const data =
await res.json();

let html = "";

data.posts.forEach(post=>{

html += `
<div style="border:1px solid #ccc;padding:10px;margin:10px;">

<h3>${post.username}</h3>

<p>${post.text}</p>

<button onclick="likePost('${post._id}')">
❤️ Like (${post.likes ? post.likes.length : 0})
</button>

${
post.username === user.username
?
`
<button onclick="deletePost('${post._id}')">
🗑️ Delete
</button>
`
:
""
}

<br><br>

<input
id="comment-${post._id}"
placeholder="Write comment">

<button
onclick="commentPost('${post._id}')">
💬 Comment
</button>

<p>
Comments:
${post.comments ? post.comments.length : 0}
</p>

</div>
`;

});

document.getElementById(
"feed"
).innerHTML = html;

}

loadPosts();

</script>

</body>
</html>
