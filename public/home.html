<!DOCTYPE html>
<html>
<head>
<title>2Chat Home</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/home.css">

</head>

<body>

<h1>🏠 2Chat Feed</h1>

  <p>
👤 Logged in as:
<b id="userName"></b>
</p>

<button onclick="goProfile()">
👤 My Profile
</button>

<button onclick="goChat()">
💬 Messages 
</button> 

<button onclick="goMessenger()">
💬 Messenger
</button>

<button onclick="logout()">
🚪 Logout
</button>

<hr>

<textarea
id="postText"
placeholder="What's happening?">
</textarea>

<br><br>

  <input
type="file"
id="postImage"
accept="image/*"
style="display:none;">

<label
for="postImage"
class="image-btn">
📷 Add Photo
</label>

<div
id="postPreview"
style="
display:none;
margin-top:10px;
text-align:center;
"><img
id="postPreviewImage"
style="
max-width:220px;
max-height:220px;
border-radius:12px;
">

<br><br>

<button
onclick="removePostImage()">
❌ Remove
</button>

</div>

<button onclick="createPost()">
Post
</button>

<hr>

<div id="feed"></div>

<script src="/js/home.js"></script>

</body>
</html>
