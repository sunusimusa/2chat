<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2Chat Home</title>

<link rel="stylesheet" href="/css/home.css">

  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  
</head>
  
<body>

<h1>2Chat</h1>

<p>
<i class="fa-solid fa-user"></i>
Logged in as:
<b id="userName"></b>
</p>

<!-- Top Menu -->
<div class="top-menu">

<button onclick="location.href='/users.html'">
<i class="fa-solid fa-user-group"></i>
Friends
</button>

<button onclick="location.href='/shorts.html'">
<i class="fa-solid fa-clapperboard"></i>
Shorts
</button>

<button onclick="location.href='/notification.html'">

<i class="fa-solid fa-bell"></i>

<span id="notificationCount"></span>

</button>

<button onclick="goProfile()">
<i class="fa-solid fa-user"></i>
Profile
</button>

<button onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</button>

</div>

<hr>

<!-- Create Post -->

<textarea
id="postText"
placeholder="What's happening?">
</textarea>

<br><br>

<input
type="file"
id="postImage"
accept="image/*"
style="display:none;">

<label
for="postImage"
class="image-btn">

<i class="fa-solid fa-image"></i>
Add Photo

</label>

<div
id="postPreview"
style="
display:none;
margin-top:10px;
text-align:center;
">

<img
id="postPreviewImage"
style="
max-width:220px;
max-height:220px;
border-radius:12px;
">

<br><br>

<button onclick="removePostImage()">

<i class="fa-solid fa-trash"></i>
Remove

</button>

</div>

<button
id="postBtn"
onclick="createPost()">

<i class="fa-solid fa-paper-plane"></i>
Post

</button>

<hr>

<!-- Feed -->

<div id="feed"></div>

<!-- Bottom Navigation -->
  <div class="bottom-nav">

<a href="/home.html" class="active">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="/shorts.html">
<i class="fa-solid fa-clapperboard"></i>
<span>Shorts</span>
</a>

<a href="/trending.html">
<i class="fa-solid fa-fire"></i>
<span>Trending</span>
</a>

<a href="/messenger.html">
<i class="fa-solid fa-comments"></i>
<span>Chats</span>
</a>

<a href="/profile.html">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</a>

</div>

<script src="/js/home.js"></script>

</body>

</html>
