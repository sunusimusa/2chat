<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2Chat Home</title>

<link rel="stylesheet" href="/css/home.css">

</head>
  
<body>

<h1>2Chat</h1>

<p>
👤 Logged in as:
<b id="userName"></b>
</p>

<!-- Top Menu -->
<div class="top-menu">

<button onclick="location.href='/users.html'">
👥 Friends
</button>

<button onclick="location.href='/shorts.html'">
🎬 Shorts
</button>

<button onclick="location.href='/notification.html'">
🔔
<span id="notificationCount"></span>
</button>

<button onclick="goProfile()">
👤 Profile
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<hr>

<!-- Create Post -->

<textarea
id="postText"
placeholder="What's happening?">
</textarea>

<br><br>

<input
type="file"
id="postImage"
accept="image/*"
style="display:none;">

<label
for="postImage"
class="image-btn">

📷 Add Photo

</label>

<div
id="postPreview"
style="
display:none;
margin-top:10px;
text-align:center;
">

<img
id="postPreviewImage"
style="
max-width:220px;
max-height:220px;
border-radius:12px;
">

<br><br>

<button onclick="removePostImage()">

❌ Remove

</button>

</div>

<button
id="postBtn"
onclick="createPost()">

🚀 Post

</button>

<hr>

<!-- Feed -->

<div id="feed"></div>

<!-- Bottom Navigation -->

<div class="bottom-nav">

<a href="/home.html" class="active">
🏠<br>Home
</a>

<a href="/shorts.html">
🎬<br>Shorts
</a>

<a href="/messenger.html">
💬<br>Chats
</a>

<a href="/notification.html">
🔔<br>Alerts
</a>

<a href="/profile.html">
👤<br>Profile
</a>

</div>

<script src="/js/home.js"></script>

</body>

</html>
