<!DOCTYPE html>
<html>
<head>
<title>2Chat Home</title>
<meta name="viewport"
content="width=device-width,initial-scale=1">
</head>
<body>

<h1>🏠 2Chat Feed</h1>

<textarea
id="postText"
placeholder="What's happening?">
</textarea>

<br><br>

<button onclick="createPost()">
Post
</button>

<hr>

<div id="feed"></div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

async function createPost(){

const text =
document.getElementById(
"postText"
).value;

const res =
await fetch(
"/api/posts/create",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:user._id,
username:user.username,
text
})
}
);

const data =
await res.json();

if(data.success){

alert("✅ Posted");

loadPosts();

}

}

async function loadPosts(){

const res =
await fetch("/api/posts");

const data =
await res.json();

let html = "";

data.posts.forEach(post=>{

html += `
<div>
<h3>${post.username}</h3>
<p>${post.text}</p>
<hr>
</div>
`;

});

document.getElementById(
"feed"
).innerHTML = html;

}

loadPosts();

</script>

</body>
</html>
