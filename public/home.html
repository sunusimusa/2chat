<!DOCTYPE html>
<html>
<head>
<title>2Chat Home</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/home.css">

</head>

<body>

<h1>🏠 2Chat Feed</h1>

  <p>
👤 Logged in as:
<b id="userName"></b>
</p>

  <div class="status-bar">

<div class="my-status"
onclick="location.href='/status.html'">

<img
src="/images/default.png"
id="statusAvatar">

<p>My Status</p>

</div>

<div
id="friendsStatus"
class="friends-status">

</div>

</div>

<hr>
  
<div class="top-menu">

<button onclick="location.href='/status.html'">
🟢 Status
</button>

<button onclick="location.href='/users.html'">
👥 Friends
</button>

<button onclick="location.href='/notification.html'">
🔔
<span id="notificationCount"></span>
</button>

<button onclick="goProfile()">
👤 Profile
</button>

<button onclick="logout()">
🚪
</button>

</div>

<textarea
id="postText"
placeholder="What's happening?">
</textarea>

<br><br>

  <input
type="file"
id="postImage"
accept="image/*"
style="display:none;">

<label
for="postImage"
class="image-btn">
📷 Add Photo
</label>

<div
id="postPreview"
style="
display:none;
margin-top:10px;
text-align:center;
"><img
id="postPreviewImage"
style="
max-width:220px;
max-height:220px;
border-radius:12px;
">

<br><br>

<button
onclick="removePostImage()">
❌ Remove
</button>

</div>

<button
id="postBtn"
onclick="createPost()">
🚀 Post
</button>
  
<hr>

<div id="feed"></div>

<script src="/js/home.js"></script>

</body>
</html>
