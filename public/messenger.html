<!DOCTYPE html>
<html>
<head>
<title>2Chat Messenger</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
height:100vh;
}

#users{
width:35%;
border-right:1px solid #ccc;
overflow:auto;
}

#chat{
flex:1;
padding:15px;
}

.user{
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.user:hover{
background:#f5f5f5;
}

.user img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>
<body>

<div id="users">

<h2 align="center">
💬 Chats
</h2>

</div>

<div id="chat">

<h2>
Select User
</h2>

</div>

<script>

const me =
JSON.parse(
localStorage.getItem("user")
);

async function loadUsers(){

const res =
await fetch(
"/api/messages/list/" + me.username
);

const data =
await res.json();

let html = "";

data.chats.forEach(chat=>{

html += `

<div
class="user"
onclick="openChat('${chat.username}')"
>

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
>

<div style="flex:1;">

<b>${chat.username}</b>

<br>

<small style="color:gray;">
${chat.lastMessage}
</small>

</div>

<div style="position:relative;">

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
style="
width:50px;
height:50px;
border-radius:50%;
">

<div style="
position:absolute;
bottom:2px;
right:2px;
width:12px;
height:12px;
background:
${chat.online ? "#00c853" : "#9e9e9e"};
border-radius:50%;
border:2px solid white;
"></div>

</div>

`;

});

document.getElementById("users").innerHTML =
"<h2 align='center'>💬 Chats</h2>" + html;

}

function openChat(username){

location.href=
"/chat.html?user="+username;

}

loadUsers();

setInterval(loadUsers,5000);

</script>

</body>
</html>
