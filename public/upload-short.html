<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Short</title>

<link rel="stylesheet" href="/css/upload-short.css">

</head>

<body>

<div class="container">

<h2>🎬 Create a Short</h2>

<label for="video" class="upload-box">

<div class="upload-icon">📹</div>

<p>Select a Video</p>

<small>Maximum size: 20MB</small>

</label>

<input
type="file"
id="video"
accept="video/*"
hidden>

<video
id="preview"
controls
style="display:none;">
</video>

<textarea
id="caption"
maxlength="200"
placeholder="Write something about your video...">
</textarea>

<div class="button-group">

<button
class="upload-btn"
onclick="uploadShort()">

🚀 Upload Short

</button>

<button
class="back-btn"
onclick="history.back()">

⬅ Back

</button>

</div>

</div>

<script src="/js/upload-short.js"></script>

</body>

</html>
